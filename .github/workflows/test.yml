name: Run tests

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.device }}
    runs-on: macos-26
    timeout-minutes: 60

    strategy:
      # Run every device leg to completion: an iPad failure shouldn't hide the
      # iPhone result (or vice versa).
      fail-fast: false
      matrix:
        include:
          - device: iPhone 17 Pro
            slug: iphone
          - device: iPad Pro 11-inch (M5)
            slug: ipad

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Set Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_26.5.app

      # Some macos-26 runner-image builds intermittently ship without the named
      # simulator, and the build step then dies in ~80s with the cryptic
      # "Unable to find a device matching the provided destination specifier".
      # Wait for the device to show up (the image sometimes registers it a
      # moment late), and if it still isn't there, create it ourselves — simctl
      # accepts a device-type name and picks the newest compatible runtime. If
      # even creation fails, dump the available devices/device-types so the
      # failure is diagnosable instead of cryptic.
      - name: Ensure simulator exists
        env:
          DEVICE: ${{ matrix.device }}
        run: |
          # Match "<name> (" — simctl prints "<name> (<UDID>) (<state>)", and a
          # bare substring match would let "iPhone 17 Pro Max" satisfy a check
          # for "iPhone 17 Pro" while xcodebuild's -destination match is exact.
          for attempt in 1 2 3; do
            if xcrun simctl list devices available | grep -Fq "$DEVICE ("; then
              echo "Found simulator '$DEVICE' on attempt $attempt."
              exit 0
            fi
            echo "Simulator '$DEVICE' not found (attempt $attempt); waiting 15s..."
            sleep 15
          done
          echo "Simulator '$DEVICE' still missing; attempting to create it."
          if xcrun simctl create "$DEVICE" "$DEVICE"; then
            echo "Created simulator '$DEVICE'."
            exit 0
          fi
          echo "Failed to create simulator '$DEVICE'. Available devices and device types:"
          xcrun simctl list devices available
          xcrun simctl list devicetypes
          exit 1

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project OpenAppLock.xcodeproj \
            -scheme OpenAppLock \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }}' \
            -xcconfig Config/CI.xcconfig

      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          xcodebuild test-without-building \
            -project OpenAppLock.xcodeproj \
            -scheme OpenAppLock \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }}' \
            -resultBundlePath ./output/test-result.xcresult \
            -xcconfig Config/CI.xcconfig

      - name: Compress test result
        run: |
          ditto -c -k --keepParent "output/test-result.xcresult" "output/test-result.zip"

      - name: Upload test result
        uses: actions/upload-artifact@v4
        with:
          name: test-result-${{ matrix.slug }}
          path: output/test-result.zip

      - name: Check for test failure
        if: steps.tests.outcome == 'failure'
        run: |
          echo "Tests failed on ${{ matrix.device }}. Check the uploaded artifacts for details."
          exit 1
